# Demo configuration — used with --fixture, so no Google Sheet, GitHub repo,
# or credentials are needed. Run:
#   tributeflow --config examples/demo-config.yaml --fixture examples/sample_sheet.json --dry-run
sheet_id: "demo"

walls:
  pets:
    tab: "Pet"
    csv_header: "In Honor/Memory Of:,Tribute Name,Donor Name,Image URL"
    columns:
      tribute_type: "In Honor/Memory Of:"
  people:
    tab: "People"
    csv_header: "In Honor or Memory Of:,Tribute Name,Donor Name,Image URL"

columns:
  tribute_type: "In Honor or Memory Of:"
  tribute_name: "Tribute Name"
  donor_name: "Donor Name"
  image_url: "Image URL"

state_path: "examples/.demo-state.json"
summary_path: "examples/.demo-summary.json"
