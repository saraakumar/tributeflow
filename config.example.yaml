# Copy to config.yaml and fill in. Secrets go in environment variables, not here.
sheet_id: "YOUR_GOOGLE_SHEET_ID"

# Each wall maps one sheet tab to one website repo. The site renders csv_path
# directly (no build step), so csv_header must match what its app.js expects.
walls:
  pets:
    tab: "Pet"
    repo: "your-org/Pet-Wall"
    branch: "main"
    csv_path: "Tribute.csv"
    csv_header: "In Honor/Memory Of:,Tribute Name,Donor Name,Image URL"
    columns:
      tribute_type: "In Honor/Memory Of:"   # this tab's header differs from People's
  people:
    tab: "People"
    repo: "your-org/Tribute-Wall"
    branch: "main"
    csv_path: "Tribute.csv"
    csv_header: "In Honor or Memory Of:,Tribute Name,Donor Name,Image URL"

# Map pipeline fields to the exact header text in row 1 of each tab.
# tribute_name and donor_name are required; per-wall `columns` override these.
columns:
  tribute_type: "In Honor or Memory Of:"
  tribute_name: "Tribute Name"
  donor_name: "Donor Name"
  image_url: "Image URL"

# Recipients are used by the Apps Script emailer (and the optional SMTP path).
email:
  sender: "tributeflow@example.org"   # only used if SMTP secrets are set
  recipients:
    - "development@example.org"
    - "comms@example.org"

model: "claude-opus-4-8"
state_path: "state/published.json"
summary_path: "last_run_summary.json"   # committed back; polled by the Apps Script
