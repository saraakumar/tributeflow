name: Agent evals

on:
  workflow_dispatch: {}   # manual: run when agent.py or the prompt changes
  pull_request:
    paths:
      - "src/tributeflow/agent.py"
      - "evals/golden.json"

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install .
      - name: Run evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: tributeflow-eval
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: evals/results.json
