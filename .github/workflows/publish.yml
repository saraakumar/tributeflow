name: Publish tribute wall

on:
  repository_dispatch:
    types: [publish]          # fired by the "Publish to Wall" button in the Google Sheet
  workflow_dispatch: {}       # manual runs from the Actions tab

concurrency:
  group: publish              # never run two publishes at once
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install .

      # The Apps Script commits incoming/sheet_data.json just before dispatching,
      # so the pipeline reads the sheet snapshot from the repo — no Google
      # credentials needed anywhere.
      - name: Publish
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
        run: tributeflow --config config.yaml --fixture incoming/sheet_data.json

      # last_run_summary.json is what the Apps Script polls to send the
      # summary email from the staff member's own account.
      - name: Persist state and run summary
        run: |
          git config user.name "tributeflow-bot"
          git config user.email "actions@github.com"
          git add state/published.json last_run_summary.json
          if ! git diff --cached --quiet; then
            git pull --rebase
            git commit -m "Update published state and run summary"
            git push
          fi
